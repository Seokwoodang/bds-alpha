<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button onClick="{{ it.open }}" style="text-align:left;background:#fff;border:1px solid #E6ECF4;border-radius:16px;overflow:hidden;cursor:pointer;padding:0;font-family:inherit;display:flex;flex-direction:column;width:100%;" style-hover="border-color:#1C5DDA;transform:translateY(-3px);box-shadow:0 16px 36px rgba(12,35,64,0.1);">
  <div style="position:relative;height:168px;background:{{ it.cover }};display:flex;align-items:center;justify-content:center;">
    <span style="font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9FB1C9;">[ 매물 사진 ]</span>
    <span style="position:absolute;top:12px;left:12px;{{ it.dealStyle }}">{{ it.deal }}</span>
    <span onClick="{{ it.toggle }}" style="position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;font-size:17px;color:#E5484D;cursor:pointer;" style-hover="background:#fff;">{{ it.heart }}</span>
  </div>
  <div style="padding:16px 17px 18px;flex:1;display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">
      <span style="font-size:12px;font-weight:700;color:#1C5DDA;background:#EAF1FC;padding:2px 8px;border-radius:5px;">{{ it.type }}</span>
      <span style="font-size:12px;color:#8499B3;font-weight:600;">{{ it.region }} {{ it.dong }}</span>
    </div>
    <div style="font-size:17px;font-weight:700;color:#0C2340;line-height:1.3;margin-bottom:8px;">{{ it.title }}</div>
    <div style="font-size:21px;font-weight:800;color:#0C2340;letter-spacing:-0.02em;margin-bottom:4px;">{{ it.priceText }}</div>
    <div style="font-size:13px;color:#7286A0;margin-bottom:14px;">{{ it.areaText }}</div>
    <div style="margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:13px;border-top:1px solid #F0F3F8;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <sc-for list="{{ it.tags }}" as="t" hint-placeholder-count="2">
          <span style="font-size:11px;color:#7286A0;background:#F2F5FA;padding:3px 9px;border-radius:30px;">{{ t }}</span>
        </sc-for>
      </div>
      <span style="font-size:13px;font-weight:700;color:#0E9F6E;white-space:nowrap;">{{ it.roiText }}</span>
    </div>
  </div>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:360},&quot;it&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
